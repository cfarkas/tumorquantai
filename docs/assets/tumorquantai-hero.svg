<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 540" role="img" aria-labelledby="title description">
  <title id="title">TumorQuantAI whole-slide image analysis workflow</title>
  <desc id="description">An abstract, non-clinical diagram showing a digital slide becoming tissue tiles, colored cell classes, and cohort tables.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.55" stop-color="#172554"/>
      <stop offset="1" stop-color="#0f4c5c"/>
    </linearGradient>
    <linearGradient id="slideFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto">
      <path d="M0 0 10 5 0 10Z" fill="#5eead4"/>
    </marker>
    <pattern id="tileGrid" width="38" height="38" patternUnits="userSpaceOnUse">
      <rect width="36" height="36" rx="5" fill="#e0f2fe"/>
      <path d="M6 23C13 8 22 30 31 12" fill="none" stroke="#0ea5e9" stroke-width="4" stroke-linecap="round"/>
    </pattern>
  </defs>

  <rect width="1440" height="540" rx="28" fill="url(#background)"/>
  <circle cx="1360" cy="72" r="170" fill="#14b8a6" opacity="0.08"/>
  <circle cx="70" cy="520" r="220" fill="#38bdf8" opacity="0.07"/>

  <text x="82" y="95" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="48" font-weight="760">TumorQuantAI</text>
  <text x="84" y="137" fill="#bae6fd" font-family="system-ui, sans-serif" font-size="22">From whole-slide images to reviewable cell-type measurements</text>

  <g transform="translate(84 190)" filter="url(#shadow)">
    <rect width="250" height="245" rx="20" fill="url(#slideFill)"/>
    <rect x="22" y="22" width="206" height="166" rx="13" fill="#fdf2f8"/>
    <path d="M38 121C61 53 99 68 121 106s52 47 88-31M47 148c26-30 54-28 77-5 26 27 48 22 91-4" fill="none" stroke="#c026d3" stroke-width="17" stroke-linecap="round" opacity="0.55"/>
    <path d="M47 80c24-30 50-31 72-2 24 31 54 25 91-12" fill="none" stroke="#db2777" stroke-width="10" stroke-linecap="round" opacity="0.62"/>
    <rect x="22" y="203" width="90" height="15" rx="7.5" fill="#94a3b8"/>
    <rect x="124" y="203" width="104" height="15" rx="7.5" fill="#cbd5e1"/>
  </g>
  <text x="209" y="472" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="18" font-weight="650">exported WSI</text>

  <path d="M365 312H448" fill="none" stroke="#5eead4" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g transform="translate(478 207)" filter="url(#shadow)">
    <rect width="245" height="211" rx="20" fill="#f8fafc"/>
    <rect x="22" y="22" width="201" height="167" rx="12" fill="url(#tileGrid)"/>
    <rect x="82" y="61" width="76" height="76" rx="8" fill="none" stroke="#0f766e" stroke-width="7"/>
  </g>
  <text x="600" y="454" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="18" font-weight="650">tissue tiles</text>

  <path d="M754 312H837" fill="none" stroke="#5eead4" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g transform="translate(867 207)" filter="url(#shadow)">
    <rect width="245" height="211" rx="20" fill="#f8fafc"/>
    <g stroke="#fff" stroke-width="5">
      <circle cx="55" cy="60" r="19" fill="#0ea5e9"/>
      <circle cx="106" cy="49" r="15" fill="#f59e0b"/>
      <circle cx="160" cy="66" r="22" fill="#14b8a6"/>
      <circle cx="204" cy="46" r="14" fill="#a855f7"/>
      <circle cx="74" cy="119" r="24" fill="#14b8a6"/>
      <circle cx="130" cy="107" r="18" fill="#0ea5e9"/>
      <circle cx="186" cy="119" r="24" fill="#f43f5e"/>
      <circle cx="42" cy="166" r="14" fill="#a855f7"/>
      <circle cx="102" cy="163" r="23" fill="#f43f5e"/>
      <circle cx="159" cy="162" r="16" fill="#f59e0b"/>
      <circle cx="210" cy="167" r="18" fill="#0ea5e9"/>
    </g>
  </g>
  <text x="989" y="454" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="18" font-weight="650">typed cells</text>

  <path d="M1143 312H1203" fill="none" stroke="#5eead4" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g transform="translate(1230 207)" filter="url(#shadow)">
    <rect width="140" height="211" rx="20" fill="#f8fafc"/>
    <rect x="20" y="24" width="100" height="163" rx="8" fill="#e2e8f0"/>
    <g fill="#fff">
      <rect x="27" y="31" width="86" height="22" rx="3"/>
      <rect x="27" y="60" width="86" height="22" rx="3"/>
      <rect x="27" y="89" width="86" height="22" rx="3"/>
      <rect x="27" y="118" width="86" height="22" rx="3"/>
      <rect x="27" y="147" width="86" height="33" rx="3"/>
    </g>
    <g fill="#0f766e">
      <rect x="34" y="37" width="25" height="10" rx="2"/>
      <rect x="69" y="37" width="37" height="10" rx="2"/>
      <rect x="34" y="66" width="52" height="10" rx="2"/>
      <rect x="34" y="95" width="35" height="10" rx="2"/>
      <rect x="78" y="95" width="28" height="10" rx="2"/>
      <rect x="34" y="124" width="72" height="10" rx="2"/>
      <rect x="34" y="154" width="18" height="19" rx="2"/>
      <rect x="58" y="160" width="18" height="13" rx="2"/>
      <rect x="82" y="150" width="24" height="23" rx="2"/>
    </g>
  </g>
  <text x="1300" y="454" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="18" font-weight="650">tables</text>

  <g transform="translate(84 493)">
    <circle cx="7" cy="0" r="7" fill="#5eead4"/>
    <text x="26" y="7" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="17">reproducible sampling</text>
    <circle cx="245" cy="0" r="7" fill="#38bdf8"/>
    <text x="264" y="7" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="17">auditable failures</text>
    <circle cx="452" cy="0" r="7" fill="#f9a8d4"/>
    <text x="471" y="7" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="17">reviewable overlays</text>
  </g>
</svg>
